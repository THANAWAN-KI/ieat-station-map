name: Update IEAT Station GeoJSON

on:
  workflow_dispatch:

  schedule:
    # ทำงานทุกวันประมาณ 01:15 UTC
    # เท่ากับประมาณ 08:15 น. ประเทศไทย
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  update-geojson:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download and validate GeoJSON
        run: python update_station.py

      - name: Check whether data changed
        id: changes
        run: |
          if git diff --quiet -- station.geojson update_metadata.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add station.geojson update_metadata.json
          git commit -m "Update IEAT station GeoJSON"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No station data changes were detected."
